# ==============================================================
# CONFIGURACOES DO BANCO DE DADOS (PostgreSQL)
# ==============================================================
# Na Render, ele usar� a URL da vari�vel de ambiente. Localmente, usa o localhost.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/remedios}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gsvbrcb1}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# CONFIGURACOES DO JPA / HIBERNATE
# ==============================================================
# 'update' para n�o apagar seus dados a cada restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.hbm2ddl.delimiter=;

# ==============================================================
# CONFIGURACOES DO SPRING WEB E RECURSOS EST�TICOS
# ==============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# Garante que o Spring encontre seu index.html na pasta static
spring.web.resources.static-locations=classpath:/static/
spring.mvc.welcome-page=index.html

# Caso queira usar o padr�o antigo de caminhos (opcional, mas ajuda com o erro que tivemos)
# spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ==============================================================
# CONFIGURACOES DO JWT
# ==============================================================
jwt.secret=${JWT_SECRET:delta1-super-secret-key-muito-longa-para-seguranca-2025}
jwt.expiration=86400000

# ==============================================================
# CONFIGURACOES DO OLLAMA (IA LOCAL)
# ==============================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3
spring.ai.ollama.enabled=true

# ==============================================================
# CONFIGURACOES DO GOOGLE CALENDAR
# ==============================================================
google.calendar.timezone=America/Sao_Paulo
google.calendar.application-name=Projeto Delta
google.calendar.tokens-path=tokens
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:}

# ==============================================================
# CONFIGURACOES DO MERCADOPAGO
# ==============================================================
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:TEST-TOKEN-AQUI}

# ==============================================================
# CONFIGURACOES DO APP
# ==============================================================
app.base.url=${APP_BASE_URL:https://teste-ujlk.onrender.com}

# ==============================================================
# LOGGING E THYMELEAF
# ==============================================================
logging.level.org.springframework.web=DEBUG
logging.level.com.delta1=DEBUG
spring.thymeleaf.check-template-location=false